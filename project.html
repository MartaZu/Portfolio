<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progetto — Marta Zuliani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0066cc; --blue-dark: #0071e3; --blue-light: #2997ff;
      --ink: #1d1d1f; --ink-80: #333333; --ink-48: #7a7a7a; --muted: #cccccc;
      --canvas: #ffffff; --parchment: #f5f5f7;
      --hairline: #e0e0e0; --divider: #f0f0f0;
      --accent: #0066cc;
      --font: "Inter", system-ui, -apple-system, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); font-size: 17px; font-weight: 400; line-height: 1.47; letter-spacing: -0.374px; color: var(--ink); background: var(--canvas); -webkit-font-smoothing: antialiased; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 100; background: rgba(255,255,255,0.82); backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; padding: 0 32px; transition: border-color 0.2s; }
    .nav-inner { max-width: 1080px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .nav-back { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-48); text-decoration: none; transition: color 0.15s; }
    .nav-back:hover { color: var(--blue); }
    .nav-logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--ink); text-decoration: none; }
    .nav-cta { font-size: 13px; color: var(--blue); border: 1px solid var(--blue); border-radius: 9999px; padding: 7px 18px; text-decoration: none; transition: background 0.15s, color 0.15s; }
    .nav-cta:hover { background: var(--blue); color: #fff; }

    /* HERO */
    .project-hero { padding: 120px 32px 64px; }
    .project-hero-inner { max-width: 1080px; margin: 0 auto; }
    .breadcrumb { font-size: 13px; color: var(--ink-48); margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
    .breadcrumb a { color: var(--blue); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .project-tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .proj-tag { font-size: 12px; font-weight: 500; color: var(--accent); background: rgba(0,102,204,0.07); border-radius: 9999px; padding: 5px 12px; }
    .project-title { font-size: clamp(32px, 5vw, 60px); font-weight: 600; letter-spacing: -0.04em; line-height: 1.06; color: var(--ink); margin-bottom: 20px; }
    .project-subtitle { font-size: clamp(17px, 2.5vw, 22px); font-weight: 300; color: var(--ink-48); line-height: 1.45; max-width: 700px; margin-bottom: 48px; }
    .project-meta-bar { display: flex; flex-wrap: wrap; gap: 40px; padding: 28px 0; border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline); margin-bottom: 64px; }
    .meta-col { display: flex; flex-direction: column; gap: 4px; }
    .meta-col-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-48); }
    .meta-col-value { font-size: 15px; color: var(--ink); }

    /* COVER */
    .cover-wrap { max-width: 1080px; margin: 0 auto 72px; padding: 0 32px; }
    .cover-inner { width: 100%; aspect-ratio: 16/8; border-radius: 20px; overflow: hidden; }
    .cover-inner img { width: 100%; height: 100%; object-fit: cover; }
    .cover-gradient-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .cover-gradient-label { font-size: 12px; font-family: monospace; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; }

    /* BODY */
    .project-body { max-width: 1080px; margin: 0 auto; padding: 0 32px 100px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; margin-bottom: 72px; align-items: start; }
    .full-col { margin-bottom: 72px; }
    .section-kicker { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .section-h2 { font-size: clamp(22px, 3vw, 34px); font-weight: 600; letter-spacing: -0.03em; line-height: 1.15; color: var(--ink); margin-bottom: 18px; }
    .body-text { font-size: 17px; line-height: 1.65; color: var(--ink-80); }
    .body-text + .body-text { margin-top: 16px; }

    /* GALLERY */
    .gallery-section { margin-bottom: 72px; }
    .gallery-grid { display: grid; gap: 14px; }
    .gallery-grid.g1 { grid-template-columns: 1fr; }
    .gallery-grid.g2 { grid-template-columns: 1fr 1fr; }
    .gallery-grid.g3 { grid-template-columns: repeat(3, 1fr); }
    .gallery-grid.g4 { grid-template-columns: repeat(2, 1fr); }
    .gallery-item { border-radius: 14px; overflow: hidden; aspect-ratio: 4/3; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* OUTCOMES */
    .outcomes-grid { display: grid; gap: 20px; margin-bottom: 72px; }
    .outcomes-grid.o1 { grid-template-columns: 1fr; max-width: 320px; }
    .outcomes-grid.o2 { grid-template-columns: 1fr 1fr; }
    .outcomes-grid.o3 { grid-template-columns: repeat(3, 1fr); }
    .outcome-card { background: var(--parchment); border-radius: 16px; padding: 28px 24px; }
    .outcome-number { font-size: 40px; font-weight: 600; letter-spacing: -0.04em; color: var(--accent); line-height: 1; margin-bottom: 8px; }
    .outcome-label { font-size: 15px; color: var(--ink-80); line-height: 1.4; }

    /* NEXT / BACK */
    .nav-card { background: var(--parchment); border-radius: 20px; padding: 40px 44px; display: flex; align-items: center; justify-content: space-between; gap: 24px; text-decoration: none; color: inherit; transition: transform 0.2s; margin-bottom: 40px; }
    .nav-card:hover { transform: translateY(-3px); }
    .nav-card-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-48); margin-bottom: 8px; }
    .nav-card-title { font-size: 22px; font-weight: 600; letter-spacing: -0.03em; color: var(--ink); }
    .nav-card-arrow { font-size: 28px; color: var(--blue); flex-shrink: 0; }
    .divider { border: none; border-top: 1px solid var(--hairline); margin-bottom: 72px; }

    /* NOT FOUND */
    .not-found { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .not-found h1 { font-size: 32px; font-weight: 600; margin-bottom: 16px; }
    .not-found p { color: var(--ink-48); margin-bottom: 32px; }

    /* FOOTER */
    footer { background: var(--parchment); padding: 40px 32px; border-top: 1px solid var(--hairline); }
    .footer-inner { max-width: 1080px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .footer-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .footer-copy { font-size: 12px; color: var(--ink-48); }

    @media (max-width: 840px) {
      .two-col { grid-template-columns: 1fr; gap: 40px; }
      .outcomes-grid.o3 { grid-template-columns: 1fr 1fr; }
      .gallery-grid.g3 { grid-template-columns: 1fr 1fr; }
      .cover-wrap, .project-body { padding-left: 24px; padding-right: 24px; }
      .project-hero { padding-left: 24px; padding-right: 24px; }
    }
    @media (max-width: 600px) {
      .outcomes-grid.o2, .outcomes-grid.o3 { grid-template-columns: 1fr; }
      .gallery-grid.g2, .gallery-grid.g3, .gallery-grid.g4 { grid-template-columns: 1fr; }
      .nav-card { flex-direction: column; align-items: flex-start; padding: 28px; }
    }
  </style>
</head>
<body>

<nav id="main-nav">
  <div class="nav-inner">
    <a href="portfolio.html" class="nav-back">← Tutti i progetti</a>
    <a href="portfolio.html" class="nav-logo">Marta Zuliani</a>
    <a href="portfolio.html#contact" class="nav-cta">Get in touch</a>
  </div>
</nav>

<div id="page-content">
  <!-- injected by JS -->
</div>

<footer>
  <div class="footer-inner">
    <span class="footer-name">Marta Zuliani</span>
    <span class="footer-copy">© 2026</span>
  </div>
</footer>

<script>
const STORAGE_KEY = 'marta_portfolio_projects';

function getProjects() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
  catch(e) { return []; }
}

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function nl2p(text) {
  if (!text) return '';
  return text.split(/\n\n+/).filter(Boolean).map(p=>`<p class="body-text">${escHtml(p).replace(/\n/g,'<br>')}</p>`).join('');
}

function render(project, allProjects) {
  const idx = allProjects.findIndex(p => p.id === project.id);
  const prev = allProjects[idx - 1];
  const next = allProjects[idx + 1];

  // Tags
  const tagsHTML = (project.tags||[]).map(t=>`<span class="proj-tag">${escHtml(t)}</span>`).join('');

  // Meta bar
  const metas = [
    {label:'Cliente', value: project.client},
    {label:'Ruolo', value: project.role},
    {label:'Periodo', value: project.duration || project.year},
    {label:'Team', value: project.team},
  ].filter(m=>m.value).map(m=>`
    <div class="meta-col">
      <span class="meta-col-label">${escHtml(m.label)}</span>
      <span class="meta-col-value">${escHtml(m.value)}</span>
    </div>`).join('');

  // Cover
  let coverHTML = '';
  if (project.coverImage) {
    coverHTML = `<div class="cover-inner"><img src="${project.coverImage}" alt="${escHtml(project.title)}" /></div>`;
  } else if (project.coverGradient) {
    coverHTML = `<div class="cover-inner"><div class="cover-gradient-box" style="background:${project.coverGradient}"><span class="cover-gradient-label">${escHtml(project.client||project.title)}</span></div></div>`;
  }

  // Gallery
  let galleryHTML = '';
  const imgs = (project.gallery||[]).filter(Boolean);
  if (imgs.length > 0) {
    const gridClass = imgs.length===1?'g1':imgs.length===2?'g2':imgs.length===3?'g3':'g4';
    const thumbs = imgs.map(src=>`<div class="gallery-item"><img src="${src}" alt="gallery" loading="lazy" /></div>`).join('');
    galleryHTML = `<div class="gallery-section"><div class="gallery-grid ${gridClass}">${thumbs}</div></div>`;
  }

  // Story sections
  const storyHTML = [
    {kicker:'Challenge', key:'challenge'},
    {kicker:'Approccio', key:'approach'},
    {kicker:'Soluzione', key:'solution'},
  ].filter(s=>project[s.key]).map(s=>`
    <div>
      <p class="section-kicker">${s.kicker}</p>
      <h2 class="section-h2">${getHeadline(s.kicker, project)}</h2>
      ${nl2p(project[s.key])}
    </div>`);

  let storySection = '';
  if (storyHTML.length >= 2) {
    storySection = `<div class="two-col">${storyHTML.slice(0,2).join('')}</div>`;
    if (storyHTML[2]) storySection += `<div class="full-col">${storyHTML[2]}</div>`;
  } else if (storyHTML.length === 1) {
    storySection = `<div class="full-col">${storyHTML[0]}</div>`;
  }

  // Outcomes
  let outcomesHTML = '';
  const stats = (project.outcomeStats||[]).filter(s=>s.number||s.label);
  if (stats.length > 0) {
    const gridClass = stats.length===1?'o1':stats.length===2?'o2':'o3';
    const cards = stats.map(s=>`
      <div class="outcome-card">
        <p class="outcome-number">${escHtml(s.number)}</p>
        <p class="outcome-label">${escHtml(s.label)}</p>
      </div>`).join('');
    outcomesHTML = `<div class="outcomes-grid ${gridClass}">${cards}</div>`;
  }

  // Navigation cards
  let navHTML = '<hr class="divider" />';
  if (next) {
    navHTML += `<a href="project.html?id=${escHtml(next.id)}" class="nav-card">
      <div><p class="nav-card-label">Progetto successivo</p><p class="nav-card-title">${escHtml(next.title)}</p></div>
      <span class="nav-card-arrow">→</span>
    </a>`;
  } else {
    navHTML += `<a href="portfolio.html#work" class="nav-card">
      <div><p class="nav-card-label">Tutti i progetti</p><p class="nav-card-title">Torna al portfolio ↗</p></div>
      <span class="nav-card-arrow">↑</span>
    </a>`;
  }

  document.getElementById('page-content').innerHTML = `
    <section class="project-hero">
      <div class="project-hero-inner">
        <p class="breadcrumb"><a href="../portfolio.html">Work</a> › ${escHtml(project.client||project.title)}</p>
        <div class="project-tag-row">${tagsHTML}</div>
        <h1 class="project-title">${escHtml(project.title)}</h1>
        <p class="project-subtitle">${escHtml(project.subtitle)}</p>
        <div class="project-meta-bar">${metas}</div>
      </div>
    </section>
    <div class="cover-wrap">${coverHTML}</div>
    <div class="project-body">
      ${storySection}
      ${galleryHTML}
      ${outcomesHTML}
      ${navHTML}
    </div>`;

  document.title = `${project.title} — Marta Zuliani`;

  // Fade-in sections
  document.querySelectorAll('.two-col > div, .full-col, .outcome-card, .gallery-item').forEach((el,i)=>{
    el.style.opacity='0'; el.style.transform='translateY(18px)';
    el.style.transition=`opacity .5s ease ${i*0.06}s, transform .5s ease ${i*0.06}s`;
  });
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; obs.unobserve(e.target); }});
  },{threshold:0.1});
  document.querySelectorAll('.two-col > div, .full-col, .outcome-card, .gallery-item').forEach(el=>obs.observe(el));
}

function getHeadline(kicker, project) {
  const map = {
    'Challenge': 'Il problema',
    'Approccio': 'Il metodo',
    'Soluzione': 'Il risultato',
  };
  return map[kicker] || kicker;
}

function showNotFound() {
  document.getElementById('page-content').innerHTML = `
    <div class="not-found">
      <h1>Progetto non trovato</h1>
      <p>Il progetto richiesto non esiste o è stato rimosso.</p>
      <a href="../portfolio.html" style="color:var(--blue);font-size:16px;">← Torna al portfolio</a>
    </div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
const id = getParam('id');
if (!id) {
  showNotFound();
} else {
  const projects = getProjects();
  const project = projects.find(p => p.id === id);
  if (!project) {
    showNotFound();
  } else {
    const sorted = projects.slice().sort((a,b)=>(a.order||0)-(b.order||0));
    render(project, sorted);
  }
}

// Navbar shadow on scroll
window.addEventListener('scroll',()=>{
  document.getElementById('main-nav').style.borderBottomColor = window.scrollY>20?'rgba(0,0,0,0.1)':'rgba(0,0,0,0.08)';
},{passive:true});
</script>

</body>
</html>
